apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-web
spec:
  selector:
    matchLabels:
      app: app-web
  template:
    metadata:
      labels:
        app: app-web
    spec:
      containers:
      - name: app-web
        image: danferreira011/app-pilot-node
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: app-web
spec:
  selector:
    app: app-web
  ports:
  - port: 80
    targetPort: 3000