apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-web
spec:
  selector:
    matchLabels:
      app: app-web
  template:
    metadata:
      labels:
        app: app-web
    spec:
      containers:
      - name: app-web
        image: anferreira011/app-pilot-node:v2
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: app-web
spec:
  selector:
    app: app-web
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer

