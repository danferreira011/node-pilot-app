name: CI-CD
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  CI:
    runs-on: ubuntu-24.04
    steps:
    - name: Obtendo o Código
      uses: actions/checkout@v6.0.2
#autmticar no dokcerhub
#executar docker build
#executar docker push
    - name: Autenticação Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build da imagem Docker (and Push)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile
        push: true
        tags: |
          danferreira011/app-pilot-node:v${{github.run_number}}
          danferreira011/app-pilot-node:latest